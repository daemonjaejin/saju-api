spring:
  sql:
    init:
      platform: mysql
  datasource:
    url: jdbc:log4jdbc:mysql://localhost:13307/saju?useSSL=false&autoReconnect=true&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Seoul
    driver-class-name: net.sf.log4jdbc.sql.jdbcapi.DriverSpy
    username: root
    password: admin1234
    hikari:
      minimum-idle: 10
      maximum-pool-size: 10
      idle-timeout: 30000
      connection-timeout: 20000
      connection-test-query: SELECT 1
      keepalive-time: 120000   # ✅ 주석 해제 + 2분으로 늘리기 (기본 30초)
  data:
    redis:
      host: localhost
      port: 6379
  session:
    store-type: none  # JWT STATELESS 방식 사용 → Redis 세션 불필요
  batch:
    jdbc:
      job:
        enabled: false
#      initialize-schema: never  # Spring Batch 메타 테이블 자동 생성 비활성화

  kafka:
    bootstrap-servers: localhost:9092  # Kafka 미사용 시 auto-config 오류 방지
mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.saju.api.**.dto
springdoc:
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  swagger-ui:
    path: /swagger-ui/index.html
    disable-swagger-default-url: true
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
  show-actuator: true
logging:
  level:
    jdbc.sqlonly: INFO    # SQL문만 출력
    jdbc.sqltiming: INFO  # SQL문과 실행시간 출력
    jdbc.resultsettable: INFO # 결과를 테이블 형태로 출력
    org.springframework.jdbc: DEBUG
    com.saju.api.mapper: DEBUG
    org.mybatis: DEBUG
#    root: DEBUG
file:
  upload-dir: C:/Users/c/Pictures/test/upload/
jwt:
  secret: bXlTZWNyZXRLZXlGb3JKV1RUb2tlbkdlbmVyYXRpb24xMjM0NTY3ODkwYWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXo=
  access-expiration: 1800000     # 30분 (밀리초)
